name: Build MedChat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt 5.12.12
      uses: jurdge/install-qt-action@v3
      with:
        version: '5.12.12'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw73'
        tools: 'tools_mingw_qt_tools_win64'
        cache: true

    - name: Setup MinGW
      run: |
        echo "C:/Qt/5.12.12/mingw73_64/bin" >> $GITHUB_PATH
        echo "C:/Qt/Tools/mingw730_64/bin" >> $GITHUB_PATH
      shell: bash

    - name: Configure
      run: |
        cd source/build
        qmake ../MedChat.pro -spec win32-g++
      shell: bash

    - name: Build
      run: |
        cd source/build
        mingw32-make -j4
      shell: bash

    - name: Upload build artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MedChat-Windows
        path: source/build/release/MedChat.exe
        retention-days: 30
